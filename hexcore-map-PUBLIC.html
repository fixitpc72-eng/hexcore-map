<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexCore Mounts — Customer Map</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
:root {
  --black:#0a0a0a; --dark:#111214; --card:#16181c; --border:#2a2d35;
  --muted:#3a3d47; --text:#e8e9ec; --sub:#7a7f8e; --accent:#20FDF0;
  --font-head:'Barlow Condensed',sans-serif; --font-body:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--black);color:var(--text);font-family:var(--font-body);display:flex;flex-direction:column}

/* ── HEADER ── */
header{background:var(--dark);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0;gap:1rem}
.logo{font-family:var(--font-head);font-weight:900;font-size:20px;letter-spacing:.04em;text-transform:uppercase;color:var(--text);white-space:nowrap}
.logo span{color:var(--accent)}

/* View toggle */
.view-toggle{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px}
.vt-btn{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:none;border:none;color:var(--sub);padding:5px 12px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap}
.vt-btn:hover{color:var(--text)}
.vt-btn.active{background:var(--accent);color:var(--black)}

.header-badge{background:var(--accent);color:var(--black);font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:3px;white-space:nowrap}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:260px 1fr;flex:1;min-height:0}

/* ── SIDEBAR ── */
.sidebar{background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-hdr{padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub)}
.sidebar-body{flex:1;overflow-y:auto;padding:1.25rem;scrollbar-width:thin;scrollbar-color:var(--muted) transparent}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1.25rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:11px 13px}
.stat-card.full{grid-column:span 2}
.stat-num{font-family:var(--font-head);font-size:30px;font-weight:900;color:var(--text);line-height:1}
.stat-num.accent{color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.sec-lbl{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:.6rem}
.src-row{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--card);border:1px solid var(--border);border-radius:5px;margin-bottom:5px}
.ci-src{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.src-instagram{background:rgba(225,48,108,.2);color:#f472b6}
.src-facebook{background:rgba(24,119,242,.2);color:#60a5fa}
.src-shopify{background:rgba(22,163,74,.2);color:#4ade80}
.src-count{font-family:var(--font-head);font-size:17px;font-weight:700;color:var(--text)}
.top-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.top-item:last-child{border-bottom:none}
.top-rank{font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--sub);min-width:20px}
.top-name{font-size:13px;font-weight:600;color:var(--text)}
.top-loc{font-size:10px;color:var(--sub);margin-top:1px}
.top-orders{font-family:var(--font-head);font-size:17px;font-weight:700;color:var(--accent)}
.two-col{display:block}
.two-col>div+div{margin-top:1.25rem}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:6px;animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

/* ── MAP VIEW ── */
.map-area{background:var(--black);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.view-panel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.view-panel.active{opacity:1;pointer-events:all}

/* Flat map */
#map-svg-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:1.25rem}
#usa-svg{width:100%;height:100%;max-height:calc(100vh - 80px)}

/* Globe canvas */
#globe-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#globe-canvas{border-radius:50%;cursor:grab;box-shadow:0 0 60px rgba(32,253,240,.08),0 0 120px rgba(0,0,0,.8)}
#globe-canvas:active{cursor:grabbing}

/* List view */
#list-wrap{width:100%;height:100%;overflow-y:auto;padding:1.5rem;scrollbar-width:thin;scrollbar-color:var(--muted) transparent}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.list-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.9rem 1rem;transition:border-color .15s}
.list-card:hover{border-color:var(--accent)}
.lc-name{font-family:var(--font-head);font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text);margin-bottom:2px}
.lc-loc{font-size:12px;color:var(--sub);margin-bottom:6px}
.lc-bottom{display:flex;align-items:center;justify-content:space-between}
.lc-orders{font-family:var(--font-head);font-size:20px;font-weight:900;color:var(--accent);line-height:1}
.lc-orders-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}

/* Tooltip */
.map-tooltip{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;pointer-events:none;display:none;z-index:30;min-width:155px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.tt-name{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px}
.tt-loc{font-size:11px;color:var(--sub);margin-bottom:6px}
.tt-orders{font-family:var(--font-head);font-size:22px;font-weight:900;color:var(--accent);line-height:1}
.tt-orders-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em}

/* Legend */
.map-legend{position:absolute;bottom:1.25rem;left:1.25rem;background:rgba(22,24,28,.9);border:1px solid var(--border);border-radius:6px;padding:9px 13px;backdrop-filter:blur(4px)}
.legend-title{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-bottom:5px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;font-size:10px;color:var(--sub)}

/* Tagline */
.map-tagline{position:absolute;top:1rem;left:50%;transform:translateX(-50%);font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);white-space:nowrap;pointer-events:none;opacity:.6}

/* List search */
.list-search-wrap{margin-bottom:1rem;display:flex;gap:8px;align-items:center}
.list-search{flex:1;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:.6rem 1rem;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s}
.list-search:focus{border-color:var(--accent)}
.list-search::placeholder{color:var(--sub)}
.list-count{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);white-space:nowrap}

/* State filter badge */
.state-filter{display:none;align-items:center;gap:6px;background:rgba(32,253,240,.1);border:1px solid rgba(32,253,240,.3);border-radius:4px;padding:4px 10px;margin-bottom:.75rem}
.state-filter.visible{display:flex}
.sf-label{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.sf-clear{background:none;border:none;color:var(--sub);cursor:pointer;font-size:14px;padding:0 2px;transition:color .15s}
.sf-clear:hover{color:var(--accent)}

/* Globe controls */
.globe-controls{position:absolute;bottom:1.25rem;right:1.25rem;display:flex;flex-direction:column;gap:5px}
.globe-btn{background:rgba(22,24,28,.9);border:1px solid var(--border);color:var(--sub);font-family:var(--font-head);font-size:14px;font-weight:700;width:32px;height:32px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(4px)}
.globe-btn:hover{color:var(--accent);border-color:var(--accent)}
.globe-spin-btn{font-size:11px;letter-spacing:.04em;width:auto;padding:0 10px}
.globe-spin-btn.spinning{color:var(--accent);border-color:rgba(32,253,240,.4)}

/* ── PIN ANIMATION ── */
@keyframes pinDrop{
  0%{opacity:0;transform:scale(0) translateY(-8px)}
  70%{transform:scale(1.2) translateY(1px)}
  100%{opacity:.93;transform:scale(1) translateY(0)}
}
.pin-g{animation:pinDrop .35s ease-out both}

/* ── MOBILE ── */
@media(max-width:768px){
  html,body{height:auto;overflow:auto}
  .layout{grid-template-columns:1fr;height:auto}
  .map-area{height:56vw;min-height:220px;max-height:320px;order:1}
  .sidebar{order:2;height:auto;overflow:visible}
  .sidebar-body{overflow:visible;padding:.9rem}
  .stats-grid{grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:.9rem}
  .stat-card.full{grid-column:span 4}
  .stat-num{font-size:22px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-top:.9rem}
  .map-tagline{display:none}
  header{padding:0 1rem;height:50px}
  .logo{font-size:17px}
  .vt-btn{padding:4px 8px;font-size:11px}
  #list-wrap{height:60vw;min-height:300px}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .stat-card.full{grid-column:span 2}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">Hex<span>Core</span> Mounts</div>
  <div class="view-toggle">
    <button class="vt-btn active" id="btn-map" onclick="setView('map')">Map</button>
    <button class="vt-btn" id="btn-globe" onclick="setView('globe')">Globe</button>
    <button class="vt-btn" id="btn-list" onclick="setView('list')">List</button>
  </div>
  <div class="header-badge">Our Customers</div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-hdr">
      <div class="sidebar-title"><span class="pulse-dot"></span>Customer Stats</div>
    </div>
    <div class="sidebar-body">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num accent" id="s-total">0</div><div class="stat-lbl">Customers</div></div>
        <div class="stat-card"><div class="stat-num" id="s-states">0</div><div class="stat-lbl">States</div></div>
        <div class="stat-card"><div class="stat-num" id="s-orders">0</div><div class="stat-lbl">Orders</div></div>
        <div class="stat-card"><div class="stat-num" id="s-avg">0</div><div class="stat-lbl">Avg Orders</div></div>
        <div class="stat-card full"><div class="stat-num" id="s-top-state" style="font-size:20px">—</div><div class="stat-lbl">Top State</div></div>
      </div>
      <div class="two-col">
        <div>
          <div class="sec-lbl">By Source</div>
          <div id="source-breakdown"></div>
        </div>
        <div>
          <div class="sec-lbl">Top Customers</div>
          <div id="top-customers"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAP AREA -->
  <div class="map-area">

    <!-- FLAT MAP -->
    <div class="view-panel active" id="panel-map">
      <div class="map-tagline">HexCore Mounts — Nationwide</div>
      <div id="map-svg-wrap">
        <svg id="usa-svg" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
          <rect width="960" height="600" fill="#0a0a0a"/>
          <g id="states-g"></g>
          <g id="pins-g"></g>
        </svg>
      </div>
      <div class="map-legend">
        <div class="legend-title">Order count</div>
        <div class="leg-row"><svg width="10" height="10" viewBox="-5 -5 10 10"><polygon points="0,-4 3.5,-2 3.5,2 0,4 -3.5,2 -3.5,-2" fill="#20FDF0"/></svg><span>1</span></div>
        <div class="leg-row"><svg width="14" height="14" viewBox="-7 -7 14 14"><polygon points="0,-6 5.2,-3 5.2,3 0,6 -5.2,3 -5.2,-3" fill="#20FDF0"/></svg><span>2–5</span></div>
        <div class="leg-row"><svg width="18" height="18" viewBox="-9 -9 18 18"><polygon points="0,-8 6.9,-4 6.9,4 0,8 -6.9,4 -6.9,-4" fill="#20FDF0"/></svg><span>6–10</span></div>
        <div class="leg-row"><svg width="24" height="24" viewBox="-12 -12 24 24"><polygon points="0,-11 9.5,-5.5 9.5,5.5 0,11 -9.5,5.5 -9.5,-5.5" fill="#20FDF0"/></svg><span>11+</span></div>
      </div>
    </div>

    <!-- GLOBE -->
    <div class="view-panel" id="panel-globe">
      <div id="globe-wrap">
        <canvas id="globe-canvas"></canvas>
      </div>
      <div class="globe-controls">
        <button class="globe-btn globe-spin-btn" id="spin-btn" onclick="toggleSpin()" title="Auto-rotate">Spin</button>
        <button class="globe-btn" onclick="zoomGlobe(1.15)" title="Zoom in">+</button>
        <button class="globe-btn" onclick="zoomGlobe(0.87)" title="Zoom out">−</button>
      </div>
      <div class="map-legend">
        <div class="legend-title">Order count</div>
        <div class="leg-row"><svg width="10" height="10" viewBox="-5 -5 10 10"><polygon points="0,-4 3.5,-2 3.5,2 0,4 -3.5,2 -3.5,-2" fill="#20FDF0"/></svg><span>1</span></div>
        <div class="leg-row"><svg width="14" height="14" viewBox="-7 -7 14 14"><polygon points="0,-6 5.2,-3 5.2,3 0,6 -5.2,3 -5.2,-3" fill="#20FDF0"/></svg><span>2–5</span></div>
        <div class="leg-row"><svg width="18" height="18" viewBox="-9 -9 18 18"><polygon points="0,-8 6.9,-4 6.9,4 0,8 -6.9,4 -6.9,-4" fill="#20FDF0"/></svg><span>6–10</span></div>
        <div class="leg-row"><svg width="24" height="24" viewBox="-12 -12 24 24"><polygon points="0,-11 9.5,-5.5 9.5,5.5 0,11 -9.5,5.5 -9.5,-5.5" fill="#20FDF0"/></svg><span>11+</span></div>
      </div>
    </div>

    <!-- LIST -->
    <div class="view-panel" id="panel-list">
      <div id="list-wrap">
        <div class="list-search-wrap">
          <input type="text" class="list-search" id="list-search" placeholder="Search customers, city, or state…" oninput="filterList()" autocomplete="off">
          <span class="list-count" id="list-count"></span>
        </div>
        <div class="state-filter" id="state-filter">
          <span class="sf-label" id="sf-label">All States</span>
          <button class="sf-clear" onclick="clearStateFilter()" title="Clear filter">✕</button>
        </div>
        <div class="list-grid" id="list-grid"></div>
      </div>
    </div>

    <div class="map-tooltip" id="map-tooltip"></div>
  </div>

</div>

function renderStats(){
  const total=CUSTOMERS.length,states=new Set(CUSTOMERS.map(c=>c.state)).size;
  const orders=CUSTOMERS.reduce((a,c)=>a+c.orders,0);
  const avg=total?Math.round(orders/total*10)/10:0;

  document.getElementById('s-orders').textContent=orders;

  const so={};
  CUSTOMERS.forEach(c=>{so[c.state]=(so[c.state]||0)+c.orders});
  const top=Object.entries(so).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('s-top-state').textContent=top?top[0]:'—';
  const src={};
  CUSTOMERS.forEach(c=>{src[c.source]=(src[c.source]||0)+1});
  document.getElementById('source-breakdown').innerHTML=Object.entries(src)
    .sort((a,b)=>b[1]-a[1])
    .map(([s,n])=>`<div class="src-row"><span class="ci-src src-${s}">${s}</span><span class="src-count">${n}</span></div>`).join('');
  const tc=[...CUSTOMERS].sort((a,b)=>b.orders-a.orders).slice(0,6);
  document.getElementById('top-customers').innerHTML=tc.map((c,i)=>`

      <div style="display:flex;align-items:center;gap:8px">
        <span class="top-rank">#${i+1}</span>

      <span class="top-orders">${c.orders}</span>
    </div>`).join('');
}

function fmt(f,l){const fi=(f||'').trim(),li=(l||'').trim().toUpperCase();return li?`${fi} ${li}.`:fi}

/* ── HEX POINTS ── */
function hexPts(cx,cy,r){
  const p=[];
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);p.push(`${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)}`)}
  return p.join(' ')
}
function psize(o){return o>=11?11:o>=6?8:o>=2?6:4}

/* ── FLAT MAP ── */
function renderPins(){
  const layer=document.getElementById('pins-g');
  layer.innerHTML='';
  const tt=document.getElementById('map-tooltip');
  const wrap=document.getElementById('map-svg-wrap');

  CUSTOMERS.forEach((c,idx)=>{
    const coord=(c.lat&&c.lon&&projFn)?projFn([c.lon,c.lat]):(()=>{const ll=STATE_CENTROIDS[c.state];return ll&&projFn?projFn(ll):null})();
    if(!coord)return;
    const[cx,cy]=coord, sz=psize(c.orders);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','pin-g');
    g.style.animationDelay=`${idx*18}ms`;
    g.style.cursor='pointer';

    const hex=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    hex.setAttribute('points',hexPts(cx,cy,sz));
    hex.setAttribute('fill',CONFIG.pinColor);
    hex.setAttribute('stroke','rgba(0,0,0,0.5)');
    hex.setAttribute('stroke-width','0.8');
    hex.setAttribute('opacity','0.9');
    g.appendChild(hex);

    // Pulse ring for 11+ orders
    if(c.orders>=11){
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('cx',cx);ring.setAttribute('cy',cy);ring.setAttribute('r',sz+4);
      ring.setAttribute('fill','none');ring.setAttribute('stroke',CONFIG.pinColor);
      ring.setAttribute('stroke-width','1');ring.setAttribute('opacity','0.35');
      g.insertBefore(ring,hex);
    }

    g.addEventListener('mouseenter',()=>{
      hex.setAttribute('fill',CONFIG.pinColorHl);
      hex.setAttribute('stroke','rgba(32,253,240,0.8)');
      hex.setAttribute('stroke-width','1.5');
      const svgRect=document.getElementById('usa-svg').getBoundingClientRect();
      const wrapRect=wrap.getBoundingClientRect();
      const px=cx*(svgRect.width/960)+(svgRect.left-wrapRect.left);
      const py=cy*(svgRect.height/600)+(svgRect.top-wrapRect.top);
      showTT(tt,c,Math.min(px+14,wrapRect.width-175),Math.max(py-95,8));
    });
    g.addEventListener('mouseleave',()=>{
      hex.setAttribute('fill',CONFIG.pinColor);
      hex.setAttribute('stroke','rgba(0,0,0,0.5)');
      hex.setAttribute('stroke-width','0.8');
      tt.style.display='none';
    });
    g.addEventListener('click',()=>filterByState(c.state));
    layer.appendChild(g);
  });
}

function showTT(tt,c,x,y){
  tt.innerHTML=`
    <div class="tt-name">${fmt(c.first,c.lastInitial)}</div>
    <div class="tt-loc">${c.city}, ${c.state}</div>
    <div class="tt-orders">${c.orders}</div>
    <div class="tt-orders-lbl">order${c.orders!==1?'s':''}</div>
    <div style="margin-top:6px"><span class="ci-src src-${c.source}">${c.source}</span></div>`;
  tt.style.display='block';
  tt.style.left=x+'px';
  tt.style.top=y+'px';
}

function drawStates(){
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
    .then(r=>r.json()).then(us=>{
      const proj=d3.geoAlbersUsa().scale(1280).translate([480,300]);
      projFn=proj;
      const path=d3.geoPath().projection(proj);
      const states=topojson.feature(us,us.objects.states);
      d3.select('#states-g').selectAll('path').data(states.features).enter().append('path')
        .attr('d',path).attr('fill','#16181c').attr('stroke','#2a2d35').attr('stroke-width','0.8');
      renderPins();
    }).catch(()=>{
      projFn=d3.geoAlbersUsa().scale(1280).translate([480,300]);
      document.getElementById('states-g').innerHTML=`<rect x="60" y="80" width="840" height="440" rx="4" fill="#16181c" stroke="#2a2d35"/>`;
      renderPins();
    });
}

/* ── GLOBE ── */
let globeProj=null, globeCanvas=null, globeCtx=null, globeUS=null;
let isDragging=false, lastX=0, lastY=0, rotation=[0,0], spinning=false, spinRAF=null;
let globeScale=1;

function initGlobe(){
  globeCanvas=document.getElementById('globe-canvas');
  globeCtx=globeCanvas.getContext('2d');
  sizeGlobe();

  globeProj=d3.geoOrthographic()
    .scale(getGlobeR())
    .translate([globeCanvas.width/2,globeCanvas.height/2])
    .clipAngle(90)
    .rotate(rotation);

  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r=>r.json())
    .then(world=>{
      window._worldData=world;
      fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
        .then(r=>r.json()).then(us=>{
          window._usData=us;
          drawGlobe();
        });
    });

  // Drag
  globeCanvas.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;stopSpin()});
  window.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    rotation[0]+=dx*0.4;rotation[1]-=dy*0.4;
    rotation[1]=Math.max(-80,Math.min(80,rotation[1]));
    lastX=e.clientX;lastY=e.clientY;
    globeProj.rotate(rotation);drawGlobe();
  });
  window.addEventListener('mouseup',()=>isDragging=false);

  // Touch
  let lastTX=0,lastTY=0;
  globeCanvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];lastTX=t.clientX;lastTY=t.clientY;stopSpin()},{passive:false});
  globeCanvas.addEventListener('touchmove',e=>{
    e.preventDefault();const t=e.touches[0];
    const dx=t.clientX-lastTX,dy=t.clientY-lastTY;
    rotation[0]+=dx*0.4;rotation[1]-=dy*0.4;
    rotation[1]=Math.max(-80,Math.min(80,rotation[1]));
    lastTX=t.clientX;lastTY=t.clientY;
    globeProj.rotate(rotation);drawGlobe();
  },{passive:false});

  window.addEventListener('resize',()=>{sizeGlobe();drawGlobe()});
}

function getGlobeR(){
  const wrap=document.getElementById('globe-wrap');
  const s=Math.min(wrap.clientWidth,wrap.clientHeight)*0.44*globeScale;
  return Math.max(100,s);
}

function sizeGlobe(){
  const wrap=document.getElementById('globe-wrap');
  const size=Math.min(wrap.clientWidth,wrap.clientHeight)*0.9;
  globeCanvas.width=wrap.clientWidth;
  globeCanvas.height=wrap.clientHeight;
  if(globeProj){
    globeProj.scale(getGlobeR()).translate([globeCanvas.width/2,globeCanvas.height/2]);
  }
}

function drawGlobe(){
  if(!globeCtx||!globeProj||!window._worldData)return;
  const ctx=globeCtx;
  const W=globeCanvas.width,H=globeCanvas.height;
  const cx=W/2,cy=H/2,R=getGlobeR();
  ctx.clearRect(0,0,W,H);

  // Ocean
  ctx.beginPath();ctx.arc(cx,cy,R,0,2*Math.PI);
  ctx.fillStyle='#060e0d';ctx.fill();
  ctx.strokeStyle='#0d2421';ctx.lineWidth=1;ctx.stroke();

  // Subtle grid lines
  const path=d3.geoPath().projection(globeProj).context(ctx);
  ctx.beginPath();path(d3.geoGraticule()());
  ctx.strokeStyle='rgba(32,253,240,0.04)';ctx.lineWidth=0.5;ctx.stroke();

  // Countries
  const countries=topojson.feature(window._worldData,window._worldData.objects.countries);
  ctx.beginPath();path({type:'FeatureCollection',features:countries.features});
  ctx.fillStyle='#16181c';ctx.fill();
  ctx.strokeStyle='#1e2228';ctx.lineWidth=0.4;ctx.stroke();

  // US states (if visible)
  if(window._usData){
    const states=topojson.feature(window._usData,window._usData.objects.states);
    ctx.beginPath();path({type:'FeatureCollection',features:states.features});
    ctx.fillStyle='#1c1f25';ctx.fill();
    ctx.strokeStyle='#2a2d35';ctx.lineWidth=0.6;ctx.stroke();
  }

  // Outline
  ctx.beginPath();ctx.arc(cx,cy,R,0,2*Math.PI);
  ctx.strokeStyle='rgba(32,253,240,0.18)';ctx.lineWidth=1.5;ctx.stroke();

  // Pins
  CUSTOMERS.forEach(c=>{
    const ll=c.lat&&c.lon?[c.lon,c.lat]:STATE_CENTROIDS[c.state];
    if(!ll)return;
    const pt=globeProj(ll);
    if(!pt)return;
    const[px,py]=pt;
    const sz=psize(c.orders)*0.75;
    // Check if on visible side
    const rot=globeProj.rotate();
    const lon=ll[0],lat=ll[1];
    const rLon=lon+rot[0],rLat=lat+rot[1];
    const visible=Math.cos(rLat*Math.PI/180)*Math.cos(rLon*Math.PI/180)>0;
    if(!visible)return;

    ctx.save();
    ctx.translate(px,py);
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=Math.PI/180*(60*i-30);
      i===0?ctx.moveTo(sz*Math.cos(a),sz*Math.sin(a)):ctx.lineTo(sz*Math.cos(a),sz*Math.sin(a));
    }
    ctx.closePath();
    ctx.fillStyle=CONFIG.pinColor;
    ctx.globalAlpha=0.85;
    ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  });
}

function toggleSpin(){
  if(spinning){stopSpin()}else{startSpin()}
}
function startSpin(){
  spinning=true;
  document.getElementById('spin-btn').classList.add('spinning');
  document.getElementById('spin-btn').textContent='Stop';
  function frame(){
    if(!spinning)return;
    rotation[0]+=0.3;
    globeProj.rotate(rotation);
    drawGlobe();
    spinRAF=requestAnimationFrame(frame);
  }
  spinRAF=requestAnimationFrame(frame);
}
function stopSpin(){
  spinning=false;
  if(spinRAF)cancelAnimationFrame(spinRAF);
  const btn=document.getElementById('spin-btn');
  if(btn){btn.classList.remove('spinning');btn.textContent='Spin'}
}
function zoomGlobe(f){
  globeScale=Math.max(0.4,Math.min(2,globeScale*f));
  globeProj.scale(getGlobeR());
  drawGlobe();
}

/* ── LIST VIEW ── */
let listFilter='';
function renderList(){
  const q=listFilter.toLowerCase();
  const filtered=CUSTOMERS.filter(c=>{
    const matchState=!stateFilter||c.state===stateFilter;
    const matchQ=!q||fmt(c.first,c.lastInitial).toLowerCase().includes(q)||c.city.toLowerCase().includes(q)||c.state.toLowerCase().includes(q);
    return matchState&&matchQ;
  }).sort((a,b)=>b.orders-a.orders);

  document.getElementById('list-count').textContent=`${filtered.length} customer${filtered.length!==1?'s':''}`;
  document.getElementById('list-grid').innerHTML=filtered.map(c=>`
    <div class="list-card">
      <div class="lc-name">${fmt(c.first,c.lastInitial)}</div>
      <div class="lc-loc">${c.city}, ${c.state}</div>
      <div class="lc-bottom">
        <div><div class="lc-orders">${c.orders}</div><div class="lc-orders-lbl">order${c.orders!==1?'s':''}</div></div>
        <span class="ci-src src-${c.source}">${c.source}</span>
      </div>
    </div>`).join('');
}
function filterList(){
  listFilter=document.getElementById('list-search').value;
  renderList();
}
function filterByState(state){
  stateFilter=state;
  const sf=document.getElementById('state-filter');
  document.getElementById('sf-label').textContent=state;
  sf.classList.add('visible');
  setView('list');
  renderList();
}
function clearStateFilter(){
  stateFilter=null;
  document.getElementById('state-filter').classList.remove('visible');
  renderList();
}

/* ── VIEW SWITCHING ── */
let globeInited=false;
function setView(v){
  currentView=v;
  ['map','globe','list'].forEach(id=>{
    document.getElementById(`panel-${id}`).classList.toggle('active',id===v);
    document.getElementById(`btn-${id}`).classList.toggle('active',id===v);
  });
  if(v==='globe'&&!globeInited){globeInited=true;initGlobe()}
  if(v==='list')renderList();
  if(v!=='globe')stopSpin();
}

/* ── BOOT ── */
renderStats();
drawStates();
</script>
