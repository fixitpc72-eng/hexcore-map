<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexCore — CCW Reciprocity Map</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
:root{--black:#0a0a0a;--dark:#111214;--card:#16181c;--border:#2a2d35;--muted:#3a3d47;--text:#e8e9ec;--sub:#7a7f8e;--accent:#20FDF0;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--cyan:#22d3ee;--font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{background:var(--black);color:var(--text);font-family:var(--font-body);display:flex;flex-direction:column}
header{background:var(--dark);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0;gap:1rem}
.logo{font-family:var(--font-head);font-weight:900;font-size:20px;letter-spacing:.04em;text-transform:uppercase;color:var(--text);white-space:nowrap;cursor:pointer;transition:opacity .15s}.logo:hover{opacity:.8}.logo span{color:var(--accent)}
.header-badge{background:var(--accent);color:var(--black);font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:3px;white-space:nowrap}
.header-center{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;max-width:420px}
.state-select{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:7px 12px;color:var(--text);font-family:var(--font-body);font-size:14px;font-weight:500;outline:none;cursor:pointer;flex:1;max-width:300px;transition:border-color .15s}.state-select:focus{border-color:var(--accent)}.state-select option{background:var(--card);color:var(--text)}
.layout{display:grid;grid-template-columns:300px 1fr;flex:1;min-height:0}
.sidebar{background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-hdr{padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub)}
.sidebar-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;scrollbar-width:thin;scrollbar-color:var(--muted) transparent}
.pulse-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:6px;animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:11px 13px}
.stat-card.full{grid-column:span 2}
.stat-num{font-family:var(--font-head);font-size:28px;font-weight:900;color:var(--text);line-height:1}
.stat-num.accent{color:var(--accent)}.stat-num.green{color:var(--green)}.stat-num.yellow{color:var(--yellow)}.stat-num.red{color:var(--red)}
.stat-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.legend-section{margin-bottom:1rem}
.sec-lbl{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:.6rem}
.leg-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--text);font-weight:500}
.leg-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.si-title{font-family:var(--font-head);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;color:var(--text);margin-bottom:4px;line-height:1.1}
.si-subtitle{font-size:12px;color:var(--sub);margin-bottom:1rem}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}.info-row:last-child{border-bottom:none}
.ir-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;font-weight:600;min-width:90px}
.ir-value{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:180px}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tag-green{background:rgba(34,197,94,.15);color:#4ade80}.tag-yellow{background:rgba(234,179,8,.15);color:#facc15}.tag-red{background:rgba(239,68,68,.15);color:#f87171}.tag-blue{background:rgba(59,130,246,.15);color:#60a5fa}.tag-accent{background:rgba(32,253,240,.12);color:var(--accent)}.tag-cyan{background:rgba(34,211,238,.15);color:#22d3ee}
.state-list-wrap{margin-top:.75rem}
.sl-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:5px;margin-bottom:4px;cursor:pointer;transition:all .15s}.sl-item:hover{border-color:var(--accent);background:rgba(32,253,240,.04)}
.sl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sl-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.sl-tag{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.empty-state{text-align:center;padding:2rem 1rem}
.empty-icon{font-size:48px;margin-bottom:.75rem;opacity:.3}
.empty-title{font-family:var(--font-head);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub);margin-bottom:.5rem}
.empty-desc{font-size:13px;color:var(--muted);line-height:1.5}
.back-btn{display:none;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:6px 14px;color:var(--accent);font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-bottom:.75rem}.back-btn:hover{border-color:var(--accent);background:rgba(32,253,240,.06)}.back-btn.visible{display:inline-flex}
.map-area{background:var(--black);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#map-svg-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:1rem}
#usa-svg{width:100%;height:100%;max-height:calc(100vh - 80px)}
.map-tooltip{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;pointer-events:none;display:none;z-index:30;min-width:180px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.tt-name{font-family:var(--font-head);font-weight:700;font-size:16px;color:var(--text);margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
.tt-status{font-size:12px;font-weight:600;margin-bottom:4px}
.tt-detail{font-size:11px;color:var(--sub);line-height:1.4}
.tt-hint{font-size:10px;color:var(--muted);margin-top:5px;font-style:italic}
.map-legend{position:absolute;bottom:1rem;left:1rem;background:rgba(22,24,28,.92);border:1px solid var(--border);border-radius:6px;padding:10px 14px;backdrop-filter:blur(4px);z-index:10}
.legend-title{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-bottom:6px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11px;color:var(--sub);font-weight:500}
.leg-row .leg-sq{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.map-tagline{position:absolute;top:1rem;left:50%;transform:translateX(-50%);font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);white-space:nowrap;pointer-events:none;opacity:.5}
.detail-overlay{position:absolute;top:1rem;right:1rem;width:320px;max-height:calc(100% - 2rem);background:rgba(17,18,20,.96);border:1px solid var(--border);border-radius:8px;backdrop-filter:blur(10px);overflow-y:auto;display:none;z-index:20;scrollbar-width:thin;scrollbar-color:var(--muted) transparent;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.detail-overlay.visible{display:block;animation:slideIn .25s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.do-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.do-title{font-family:var(--font-head);font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;color:var(--text)}
.do-close{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;padding:4px;transition:color .15s}.do-close:hover{color:var(--accent)}
.do-body{padding:1rem 1.25rem}
.do-section{margin-bottom:1rem}
.do-section-title{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:.5rem}
.do-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.do-stat{background:rgba(32,253,240,.04);border:1px solid var(--border);border-radius:5px;padding:8px 10px}
.do-stat-val{font-family:var(--font-head);font-size:18px;font-weight:900;line-height:1}
.do-stat-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.do-link{display:block;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--accent);font-size:12px;font-weight:600;text-decoration:none;margin-bottom:4px;transition:all .15s}.do-link:hover{border-color:var(--accent);background:rgba(32,253,240,.06)}
.do-text{font-size:12px;color:var(--sub);line-height:1.5}
.mode-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 6px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.75rem}
.mode-pill.permit{background:rgba(32,253,240,.1);border:1px solid rgba(32,253,240,.25);color:var(--accent)}
.mode-dot{width:6px;height:6px;border-radius:50%}
.disclaimer{margin-top:1rem;padding:10px;background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.15);border-radius:5px;font-size:10px;color:var(--sub);line-height:1.5}.disclaimer strong{color:var(--yellow);font-weight:700}
.map-instruction{position:absolute;bottom:1rem;right:1rem;background:rgba(22,24,28,.9);border:1px solid var(--border);border-radius:6px;padding:8px 14px;backdrop-filter:blur(4px);font-size:11px;color:var(--sub);display:flex;align-items:center;gap:6px;z-index:5}
.set-permit-btn{width:100%;padding:10px;background:rgba(32,253,240,.1);border:1px solid rgba(32,253,240,.3);border-radius:5px;color:var(--accent);font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}.set-permit-btn:hover{background:rgba(32,253,240,.18)}
@media(max-width:900px){html,body{height:auto;overflow:auto}.layout{grid-template-columns:1fr;height:auto}.map-area{height:50vw;min-height:250px;max-height:380px;order:1}.sidebar{order:2;height:auto;overflow:visible}.sidebar-body{overflow:visible;padding:.9rem}.stats-grid{grid-template-columns:repeat(4,1fr);gap:5px}.stat-card.full{grid-column:span 4}.stat-num{font-size:20px}.map-tagline{display:none}header{padding:0 .75rem;height:50px;gap:.5rem}.logo{font-size:16px}.state-select{font-size:13px;padding:6px 8px}.header-badge{font-size:10px;padding:3px 8px}.detail-overlay{width:calc(100% - 2rem);left:1rem}.map-instruction{display:none}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr 1fr}.stat-card.full{grid-column:span 2}.header-center{max-width:200px}.header-badge{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="resetMap()">Hex<span>Core</span> CCW</div>
  <div class="header-center">
    <select class="state-select" id="permit-select" onchange="selectPermitState(this.value)">
      <option value="">— Or Select Permit State —</option>
    </select>
  </div>
  <div class="header-badge">Reciprocity Map</div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-hdr"><div class="sidebar-title"><span class="pulse-dot"></span>CCW Reciprocity</div></div>
    <div class="sidebar-body" id="sidebar-body"><div id="sidebar-content"></div></div>
  </div>
  <div class="map-area" id="map-area">
    <div class="map-tagline" id="map-tagline">Click a State to Begin</div>
    <div id="map-svg-wrap">
      <svg id="usa-svg" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
        <rect width="960" height="600" fill="var(--black)"/>
        <g id="states-g"></g><g id="labels-g"></g>
      </svg>
    </div>
    <div class="map-legend" id="map-legend" style="display:none">
      <div class="legend-title">Reciprocity Status</div>
      <div class="leg-row"><div class="leg-sq" style="background:var(--accent)"></div>Your Permit State</div>
      <div class="leg-row"><div class="leg-sq" style="background:var(--green)"></div>Honors Your Permit</div>
      <div class="leg-row"><div class="leg-sq" style="background:var(--cyan)"></div>Constitutional Carry</div>
      <div class="leg-row"><div class="leg-sq" style="background:var(--yellow)"></div>Restricted / Partial</div>
      <div class="leg-row"><div class="leg-sq" style="background:var(--red)"></div>Does Not Honor</div>
    </div>
    <div class="map-instruction" id="map-instruction"><span style="color:var(--accent)">⬆</span> Click any state to view reciprocity</div>
    <div class="map-tooltip" id="map-tooltip"></div>
    <div class="detail-overlay" id="detail-overlay">
      <div class="do-header"><div class="do-title" id="do-title">State</div><button class="do-close" onclick="closeDetail()">✕</button></div>
      <div class="do-body" id="do-body"></div>
    </div>
  </div>
</div>

"Virginia":{a:"VA",f:"51",pt:"Shall-Issue",cc:!1,cy:null,age:21,tr:!0,oc:!0,dti:!1,h:"sel",nh:["CA","CT","DC","HI","IL","MD","MA","NJ","NY","OR","RI","VT","WA"],r:["MN","NV","NM"],ur:!1,n:"Honors permits from specific states. Good non-resident permit option.",l:"https://www.vsp.virginia.gov/"},
"Washington":{a:"WA",f:"53",pt:"Shall-Issue",cc:!1,cy:null,age:21,tr:!1,oc:!0,dti:!1,h:"vl",nh:[],r:[],ur:!1,n:"Very limited reciprocity — honors permits from only ~10 states. Magazine capacity restrictions.",l:"https://www.dol.wa.gov/"},
"West Virginia":{a:"WV",f:"54",pt:"Shall-Issue",cc:!0,cy:2016,age:21,tr:!0,oc:!0,dti:!1,h:"all",nh:[],r:[],ur:!0,n:"Constitutional carry since 2016. Universal recognition.",l:"https://www.wvsp.gov/"},
"Wisconsin":{a:"WI",f:"55",pt:"Shall-Issue",cc:!1,cy:null,age:21,tr:!0,oc:!0,dti:!1,h:"sel",nh:["CA","CT","DC","HI","IL","MD","MA","NJ","NY","OR","RI","VT","WA"],r:["MN","NV","NM"],ur:!1,n:"Honors permits from states meeting specific standards.",l:"https://www.doj.state.wi.us/"},
"Wyoming":{a:"WY",f:"56",pt:"Shall-Issue",cc:!0,cy:2011,age:21,tr:!1,oc:!0,dti:!1,h:"all",nh:[],r:[],ur:!0,n:"Constitutional carry since 2011. Universal recognition.",l:"https://ag.wyo.gov/"}
};

const NH_STATES=["California","Connecticut","District of Columbia","Hawaii","Illinois","Maryland","Massachusetts","New Jersey","New York"];
const F2S={};Object.entries(S).forEach(([n,d])=>{F2S[d.f]=n});
let stateFeatures={};
const C={def:'#16181c',you:'#20FDF0',hon:'#22c55e',cc:'#22d3ee',res:'#eab308',no:'#ef4444',stk:'#2a2d35',stkH:'#20FDF0',stkA:'#fff'};

let proj=null,sel=null,els={};

function status(ps,ts){
  if(ps===ts)return'you';const t=S[ts],p=S[ps];if(!t||!p)return'nd';
  if(t.h==='none'||NH_STATES.includes(ts))return'no';
  if(t.ur||t.h==='all')return t.cc?'cc':'hon';
  if(t.h==='vl'){if(t.r.includes(p.a))return'res';return'no'}
  if(t.h==='sel'){if(t.nh.includes(p.a))return'no';if(t.r.includes(p.a))return'res';return t.cc?'cc':'hon'}
  return'nd';
}
function sColor(s){return{you:C.you,hon:C.hon,cc:C.cc,res:C.res,no:C.no,nd:'#3a3d47'}[s]||'#3a3d47'}
function sLabel(s){return{you:'Your Permit State',hon:'Honors Your Permit',cc:'Constitutional Carry (No Permit Needed)',res:'Restricted / Partial',no:'Does Not Honor',nd:'No Data'}[s]||'Unknown'}
function cap(s){return s?s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()):''}

function drawStates(){
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(r=>r.json()).then(us=>{
    proj=d3.geoAlbersUsa().scale(1280).translate([480,300]);
    const path=d3.geoPath().projection(proj);
    const feats=topojson.feature(us,us.objects.states);
    // Store features for centroid calculation
    feats.features.forEach(f=>{const fips=String(f.id).padStart(2,'0');const n=F2S[fips];if(n)stateFeatures[n]=f});
    d3.select('#states-g').selectAll('path').data(feats.features).enter().append('path')
      .attr('d',path).attr('fill',C.def).attr('stroke',C.stk).attr('stroke-width','0.8').attr('cursor','pointer')
      .each(function(d){const f=String(d.id).padStart(2,'0'),n=F2S[f];if(n)els[n]=this})
      .on('mouseenter',function(e,d){const n=F2S[String(d.id).padStart(2,'0')];if(!n)return;d3.select(this).attr('stroke',C.stkH).attr('stroke-width','2').raise();d3.select('#labels-g').raise();showTT(e,n)})
      .on('mousemove',function(e){moveTT(e)})
      .on('mouseleave',function(){const isS=sel&&this===els[sel];d3.select(this).attr('stroke',isS?C.stkA:C.stk).attr('stroke-width',isS?'2':'0.8');hideTT()})
      .on('click',function(e,d){const n=F2S[String(d.id).padStart(2,'0')];if(n)handleClick(n)});
    addLabels(path);
  });
}
function addLabels(path){
  const g=d3.select('#labels-g');g.selectAll('*').remove();
  Object.entries(S).forEach(([n,d])=>{
    const feat=stateFeatures[n];if(!feat)return;
    const c=path.centroid(feat);if(!c||isNaN(c[0]))return;
    g.append('text').attr('x',c[0]).attr('y',c[1]).attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('fill','rgba(255,255,255,0.35)').attr('font-family','Barlow Condensed,sans-serif')
      .attr('font-size','10').attr('font-weight','700').attr('letter-spacing','0.04em')
      .attr('pointer-events','none').attr('class',`l-${d.a}`).text(d.a);
  });
}

function handleClick(n){
  if(!sel){selectPermitState(n);return}
  if(n===sel){resetMap();return}
  showDetail(n);
}

function colorMap(){
  if(!sel){
    Object.entries(els).forEach(([n,el])=>{d3.select(el).transition().duration(300).attr('fill',C.def).attr('fill-opacity',1);d3.select(el).attr('stroke',C.stk).attr('stroke-width','0.8')});
    d3.selectAll('#labels-g text').attr('fill','rgba(255,255,255,0.35)');
    document.getElementById('map-legend').style.display='none';
    document.getElementById('map-tagline').textContent='Click a State to Begin';
    document.getElementById('map-instruction').innerHTML='<span style="color:var(--accent)">⬆</span> Click any state to view reciprocity';
    return;
  }
  document.getElementById('map-legend').style.display='block';
  document.getElementById('map-tagline').textContent=`${sel} Permit — Reciprocity`;
  document.getElementById('map-instruction').innerHTML='<span style="color:var(--accent)">🔍</span> Click another state for details';
  Object.entries(els).forEach(([n,el])=>{
    const st=status(sel,n),co=sColor(st),isY=st==='you';
    d3.select(el).transition().duration(400).attr('fill',co).attr('fill-opacity',isY?.7:st==='no'?.45:.55);
    if(isY)d3.select(el).attr('stroke',C.stkA).attr('stroke-width','2');
    const ab=S[n]?.a;if(ab)d3.select(`.l-${ab}`).attr('fill',isY?'#fff':st==='no'?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.55)');
  });
}

function selectPermitState(n){sel=n||null;document.getElementById('permit-select').value=n||'';closeDetail();colorMap();renderSidebar()}
function resetMap(){sel=null;document.getElementById('permit-select').value='';closeDetail();colorMap();renderSidebar()}

function renderSidebar(){
  const c=document.getElementById('sidebar-content');
  if(!sel){
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-title">Click a State on the Map</div><div class="empty-desc">Click the state where your concealed carry permit was issued to see which states honor it across the country.</div></div>
    <div class="legend-section" style="margin-top:1.5rem"><div class="sec-lbl">Quick Stats — 2026</div><div class="stats-grid"><div class="stat-card"><div class="stat-num accent">29</div><div class="stat-lbl">Const. Carry States</div></div><div class="stat-card"><div class="stat-num">8</div><div class="stat-lbl">No Recognition</div></div><div class="stat-card"><div class="stat-num green">37</div><div class="stat-lbl">States Honor FL</div></div><div class="stat-card"><div class="stat-num">36</div><div class="stat-lbl">States Honor UT</div></div></div></div>
    <div class="legend-section"><div class="sec-lbl">Map Colors</div><div class="leg-item"><div class="leg-swatch" style="background:var(--accent)"></div>Your Permit State</div><div class="leg-item"><div class="leg-swatch" style="background:var(--green)"></div>Honors Your Permit</div><div class="leg-item"><div class="leg-swatch" style="background:var(--cyan)"></div>Constitutional Carry</div><div class="leg-item"><div class="leg-swatch" style="background:var(--yellow)"></div>Restricted / Partial</div><div class="leg-item"><div class="leg-swatch" style="background:var(--red)"></div>Does Not Honor</div></div>
    <div class="disclaimer"><strong>⚠ Disclaimer:</strong> This map is for informational purposes only and is not legal advice. Laws change frequently. Always verify current reciprocity with official state sources before traveling with a firearm.</div>`;
    return;
  }
  const p=S[sel],cn={hon:0,cc:0,res:0,no:0},sb={hon:[],cc:[],res:[],no:[]};
  Object.keys(S).forEach(n=>{if(n===sel)return;const st=status(sel,n);if(cn[st]!==undefined){cn[st]++;sb[st].push(n)}});
  const th=cn.hon+cn.cc;
  c.innerHTML=`<button class="back-btn visible" onclick="resetMap()">← Back to Overview</button>
    <div class="mode-pill permit"><div class="mode-dot" style="background:var(--accent)"></div>Permit State</div>
    <div class="si-title">${sel}</div>
    <div class="si-subtitle">${p.a} Permit — Click another state on the map for details</div>
    <div class="stats-grid"><div class="stat-card"><div class="stat-num green">${th}</div><div class="stat-lbl">States Honor</div></div><div class="stat-card"><div class="stat-num red">${cn.no}</div><div class="stat-lbl">Don't Honor</div></div><div class="stat-card"><div class="stat-num accent">${cn.cc}</div><div class="stat-lbl">Const. Carry</div></div><div class="stat-card"><div class="stat-num yellow">${cn.res}</div><div class="stat-lbl">Restricted</div></div></div>
    <div style="margin-bottom:.75rem">
      <div class="info-row"><span class="ir-label">Permit Type</span><span class="ir-value"><span class="tag tag-blue">${p.pt}</span></span></div>
      <div class="info-row"><span class="ir-label">Const. Carry</span><span class="ir-value">${p.cc?`<span class="tag tag-green">Yes (${p.cy})</span>`:'<span class="tag tag-red">No</span>'}</span></div>
      <div class="info-row"><span class="ir-label">Min Age</span><span class="ir-value">${p.age}+</span></div>
      <div class="info-row"><span class="ir-label">Training</span><span class="ir-value">${p.tr?'Required':'Not Required'}</span></div>
      <div class="info-row"><span class="ir-label">Open Carry</span><span class="ir-value">${p.oc?'<span class="tag tag-green">Legal</span>':'<span class="tag tag-red">Prohibited</span>'}</span></div>
      <div class="info-row"><span class="ir-label">Duty to Inform</span><span class="ir-value">${p.dti?'<span class="tag tag-yellow">Yes</span>':'No'}</span></div>
    </div>
    ${p.n?`<div style="font-size:12px;color:var(--sub);line-height:1.5;margin-bottom:.75rem;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:5px">${p.n}</div>`:''}
    <a class="do-link" href="${p.l}" target="_blank" rel="noopener">🔗 ${sel} — Official Resources</a>
    ${sList('Does Not Honor Your Permit',sb.no,C.no)}
    ${sList('Restricted / Partial',sb.res,C.res)}
    ${sList('Honors Your Permit',sb.hon,C.hon)}
    ${sList('Constitutional Carry',sb.cc,C.cc)}
    <div class="disclaimer"><strong>⚠ Disclaimer:</strong> Not legal advice. Laws change frequently. Always verify with official state sources.</div>`;
}

function sList(t,arr,dc){
  if(!arr.length)return'';
  return`<div class="state-list-wrap"><div class="sec-lbl">${t} (${arr.length})</div>${arr.sort().map(n=>{const d=S[n];return`<div class="sl-item" onclick="showDetail('${n.replace(/'/g,"\\'")}')"><div class="sl-dot" style="background:${dc}"></div><span class="sl-name">${n}</span><span class="sl-tag">${d.a}</span></div>`}).join('')}</div>`;
}

function showDetail(n){
  const d=S[n];if(!d)return;
  const ov=document.getElementById('detail-overlay');
  document.getElementById('do-title').textContent=n;
  let st=sel?status(sel,n):null,h='';
  if(st){const sc=sColor(st),sl=sLabel(st);h+=`<div class="do-section"><div style="display:inline-block;padding:5px 12px;border-radius:4px;font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${sc};background:${sc}18;border:1px solid ${sc}40">${sl}</div></div>`}
  h+=`<div class="do-section"><div class="do-section-title">Overview</div><div class="do-grid">
    <div class="do-stat"><div class="do-stat-val" style="color:var(--text)">${d.pt}</div><div class="do-stat-lbl">Permit Type</div></div>
    <div class="do-stat"><div class="do-stat-val" style="color:${d.cc?'var(--green)':'var(--red)'}">${d.cc?'Yes':'No'}</div><div class="do-stat-lbl">Const. Carry</div></div>
    <div class="do-stat"><div class="do-stat-val" style="color:var(--accent)">${d.age}+</div><div class="do-stat-lbl">Min Age</div></div>
    <div class="do-stat"><div class="do-stat-val" style="color:var(--text)">${d.oc?'Legal':'No'}</div><div class="do-stat-lbl">Open Carry</div></div>
  </div></div>`;
  h+=`<div class="do-section"><div class="do-section-title">Details</div><div class="do-text">${d.n}</div></div>`;
  h+=`<div class="do-section"><div class="do-section-title">Key Info</div><div style="font-size:12px;color:var(--text)">
    <div class="info-row"><span class="ir-label">Training</span><span class="ir-value">${d.tr?'Required':'Not Required'}</span></div>
    <div class="info-row"><span class="ir-label">Duty to Inform</span><span class="ir-value">${d.dti?'<span class="tag tag-yellow">Yes</span>':'No'}</span></div>
    <div class="info-row"><span class="ir-label">Recognition</span><span class="ir-value">${d.ur?'<span class="tag tag-green">All Permits</span>':`<span class="tag tag-blue">${cap(d.h)}</span>`}</span></div>
    ${d.cc&&d.cy?`<div class="info-row"><span class="ir-label">Permitless Since</span><span class="ir-value">${d.cy}</span></div>`:''}
  </div></div>`;
  h+=`<div class="do-section"><div class="do-section-title">Official Resources</div><a class="do-link" href="${d.l}" target="_blank" rel="noopener">🔗 ${n} — Official Website</a></div>`;
  if(n!==sel)h+=`<div class="do-section"><button class="set-permit-btn" onclick="selectPermitState('${n.replace(/'/g,"\\'")}')">Set ${d.a} as My Permit State</button></div>`;
  h+=`<div class="disclaimer"><strong>⚠</strong> Not legal advice. Always verify with official state sources.</div>`;
  document.getElementById('do-body').innerHTML=h;
  ov.classList.add('visible');
}

function closeDetail(){document.getElementById('detail-overlay').classList.remove('visible')}

function showTT(e,n){
  const tt=document.getElementById('map-tooltip'),d=S[n];if(!d)return;
  let sh='',hh='';
  if(sel){const st=status(sel,n);sh=`<div class="tt-status" style="color:${sColor(st)}">${sLabel(st)}</div>`;hh=n===sel?'<div class="tt-hint">Click to deselect</div>':'<div class="tt-hint">Click for full details</div>'}
  else hh='<div class="tt-hint">Click to set as permit state</div>';
  tt.innerHTML=`<div class="tt-name">${n}</div>${sh}<div class="tt-detail">${d.pt}${d.cc?' · Constitutional Carry':''}<br>Min Age: ${d.age}+ · ${d.oc?'Open Carry Legal':'No Open Carry'}</div>${hh}`;
  tt.style.display='block';moveTT(e);
}
function moveTT(e){const tt=document.getElementById('map-tooltip'),r=document.getElementById('map-area').getBoundingClientRect();let x=e.clientX-r.left+15,y=e.clientY-r.top-10;if(x+220>r.width)x=e.clientX-r.left-220;if(y+120>r.height)y=e.clientY-r.top-120;tt.style.left=Math.max(4,x)+'px';tt.style.top=Math.max(4,y)+'px'}
function hideTT(){document.getElementById('map-tooltip').style.display='none'}

function populateDD(){const s=document.getElementById('permit-select');Object.entries(S).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([n,d])=>{const o=document.createElement('option');o.value=n;o.textContent=`${n} (${d.a})`;s.appendChild(o)})}

populateDD();renderSidebar();drawStates();
</script>
