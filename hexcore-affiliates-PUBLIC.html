<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexcore Mounts — Our Affiliates</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111214;
    --card: #16181c;
    --border: #2a2d35;
    --muted: #3a3d47;
    --text: #e8e9ec;
    --sub: #7a7f8e;
    --accent: #20FDF0;
    --ig: #e1306c;
    --fb: #1877f2;
    --font-head: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --pin-color: #20FDF0;
    --pin-color-hl: #ffffff;
    --ui-text: #e8e9ec;
    --ui-accent-text: #20FDF0;
    --name-text: #e8e9ec;
    --loc-text: #7a7f8e;
    --tooltip-name: #e8e9ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    width: 75%;
  }
  .logo { font-family: var(--font-head); font-weight: 900; font-size: 22px; letter-spacing: .04em; text-transform: uppercase; color: var(--ui-text); }
  .logo span { color: var(--ui-accent-text); }
  .header-badge { background: var(--accent); color: white; font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 4px 10px; border-radius: 3px; }

  /* ── MAP LAYOUT ── */
  .map-section { width: 75%; display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 60px); }

  .sidebar { order: -1; background: var(--dark); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 1.25rem 1.25rem .75rem; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-family: var(--font-head); font-size: 14px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sub); }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 1.25rem; scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .stat-card.full { grid-column: span 2; }
  .stat-num { font-family: var(--font-head); font-size: 32px; font-weight: 900; color: var(--text); line-height: 1; }
  .stat-num.accent { color: var(--ui-accent-text); }
  .stat-label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }
  .section-label { font-family: var(--font-head); font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sub); margin-bottom: .75rem; }

  .pulse-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.5; transform:scale(1.3); } }

  .quick-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
  .quick-item:last-child { border-bottom: none; }
  .quick-item:hover { opacity: .75; }
  .qi-name { font-size: 12px; font-weight: 600; color: var(--name-text); }
  .qi-loc { font-size: 10px; color: var(--loc-text); margin-top: 1px; }
  .qi-pills { display: flex; gap: 3px; }

  .social-pill { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .sp-ig { background: rgba(225,48,108,.2); color: #f472b6; }
  .sp-fb { background: rgba(24,119,242,.2); color: #60a5fa; }
  .sp-yt { background: rgba(255,0,0,.15); color: #f87171; }

  /* ── MAP ── */
  .map-area { background: var(--black); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #map-svg-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  #usa-svg { width: 100%; height: 100%; max-height: calc(100vh - 80px); }

  .map-tooltip { position: absolute; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; pointer-events: none; display: none; z-index: 20; min-width: 190px; max-width: 240px; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  .tt-name { font-weight: 600; font-size: 13px; color: var(--tooltip-name); margin-bottom: 2px; }
  .tt-loc { font-size: 11px; color: var(--sub); margin-bottom: 5px; }
  .tt-bio { font-size: 11px; color: var(--sub); margin-bottom: 7px; line-height: 1.45; font-style: italic; }
  .tt-social { display: flex; gap: 5px; flex-wrap: wrap; }

  .map-legend { position: absolute; bottom: 1.25rem; left: 1.25rem; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
  .map-legend-title { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--sub); margin-bottom: 6px; }
  .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px; color: var(--sub); }

  .map-tagline { position: absolute; top: 1.25rem; left: 50%; transform: translateX(-50%); font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--sub); white-space: nowrap; pointer-events: none; }

  /* ── AFFILIATE BIO CARDS ── */
  .affiliates-section {
    width: 75%;
    padding: 3rem 0 4rem;
    border-top: 1px solid var(--border);
  }
  .affiliates-section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
    padding: 0 0;
  }
  .affiliates-section-title {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ui-text);
  }
  .affiliates-section-title span { color: var(--ui-accent-text); }
  .affiliates-section-sub {
    font-size: 13px;
    color: var(--sub);
  }

  .bio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
  }

  .bio-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .75rem;
    transition: border-color .2s, transform .2s;
    cursor: default;
  }
  .bio-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .bio-card.highlighted {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(32,253,240,.1);
  }

  .bio-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: .75rem;
  }
  .bio-avatar {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    flex-shrink: 0;
    letter-spacing: .02em;
  }
  .bio-name-block { flex: 1; }
  .bio-name {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 700;
    color: var(--name-text);
    letter-spacing: .03em;
    line-height: 1.1;
  }
  .bio-location {
    font-size: 11px;
    color: var(--loc-text);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .bio-location svg { opacity: .5; flex-shrink: 0; }

  .bio-text {
    font-size: 13px;
    color: var(--sub);
    line-height: 1.6;
    flex: 1;
  }

  .bio-social {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-top: auto;
    padding-top: .5rem;
    border-top: 1px solid var(--border);
  }
  .social-link {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    transition: background .15s, opacity .15s;
  }
  .social-link:hover { opacity: .85; }
  .social-link.ig {
    background: rgba(225,48,108,.12);
    color: #f472b6;
    border: 1px solid rgba(225,48,108,.2);
  }
  .social-link.fb {
    background: rgba(24,119,242,.12);
    color: #60a5fa;
    border: 1px solid rgba(24,119,242,.2);
  }
  .social-link.yt {
    background: rgba(255,0,0,.1);
    color: #f87171;
    border: 1px solid rgba(255,0,0,.18);
  }
  .social-link svg { flex-shrink: 0; }
  .no-affiliates { text-align: center; padding: 3rem 0; color: var(--sub); font-size: 14px; }

  /* ── MOBILE ── */
  @media (max-width: 900px) {
    header, .map-section, .affiliates-section { width: 100%; }
    header { border-left: none; border-right: none; }

    .map-section {
      display: flex;
      flex-direction: column;
      height: auto;
      min-height: 100vh;
    }
    .map-area {
      order: 1;
      width: 100%;
      height: 56vw;
      min-height: 220px;
      max-height: 340px;
    }
    #map-svg-wrap { padding: .5rem; }
    #usa-svg { max-height: none; }
    .map-tagline { display: none; }
    .map-legend { padding: 6px 10px; bottom: .5rem; left: .5rem; }

    .sidebar {
      order: 2;
      width: 100%;
      border-right: none;
      border-top: 1px solid var(--border);
      overflow: visible;
      height: auto;
    }
    .sidebar-content { overflow: visible; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .stat-card.full { grid-column: span 4; }
    .stat-num { font-size: 22px; }
    .stat-label { font-size: 9px; }

    .affiliates-section { padding: 2rem 1rem 3rem; }
    .bio-grid { grid-template-columns: 1fr 1fr; }
    .affiliates-section-title { font-size: 22px; }
  }
  @media (max-width: 540px) {
    .bio-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stat-card.full { grid-column: span 2; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Hexcore <span>Mounts</span></div>
  <div class="header-badge">Our Affiliates</div>
</header>

<div class="map-section">

  <!-- MAP -->
  <div class="map-area">
    <div class="map-tagline">Hexcore Mounts — Affiliate Network</div>
    <div id="map-svg-wrap">
      <svg id="usa-svg" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
        <rect width="960" height="600" fill="#0a0a0a"/>
        <g id="states-g"></g>
        <g id="pins-g"></g>
      </svg>
    </div>
    <div class="map-tooltip" id="map-tooltip"></div>
    <div class="map-legend">
      <div class="map-legend-title">Affiliate</div>
      <div class="leg-row">
        <svg width="14" height="13" viewBox="-7 -6 14 13"><polygon id="lh1" points="0,-6 5.2,-3 5.2,3 0,6 -5.2,3 -5.2,-3" fill="#20FDF0"/></svg>
        <span>Location</span>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title"><span class="pulse-dot"></span>Affiliate Network</div>
    </div>
    <div class="sidebar-content">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num accent" id="s-total">0</div><div class="stat-label">Affiliates</div></div>
        <div class="stat-card"><div class="stat-num" id="s-states">0</div><div class="stat-label">States</div></div>
        <div class="stat-card"><div class="stat-num" id="s-ig">0</div><div class="stat-label">Instagram</div></div>
        <div class="stat-card"><div class="stat-num" id="s-fb">0</div><div class="stat-label">Facebook</div></div>
        <div class="stat-card"><div class="stat-num" id="s-yt">0</div><div class="stat-label">YouTube</div></div>
        <div class="stat-card full"><div class="stat-num" id="s-top-state" style="font-size:20px">—</div><div class="stat-label">Top State</div></div>
      </div>
      <div class="section-label">Affiliates</div>
      <div id="affiliate-quick-list"></div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     AFFILIATE BIO CARDS
══════════════════════════════════════════ -->
<div class="affiliates-section">
  <div class="affiliates-section-header">
    <div class="affiliates-section-title">Meet Our <span>Affiliates</span></div>
    <div class="affiliates-section-sub" id="aff-count-sub"></div>
  </div>
  <div class="bio-grid" id="bio-grid"></div>
</div>

<script>
/* ============================================================
   DATA — do not edit manually, use Export Public from admin
   ============================================================ */
const _d = "W10=";

function _x(s){try{return atob(s)}catch(e){return s}}
function _decode(raw){
  try {
    return JSON.parse(_x(raw)).map(r=>({
      id:r.g, first:_x(r.a), last:_x(r.b),
      city:_x(r.c), state:_x(r.d), bio:_x(r.e),
      instagram:_x(r.f), facebook:_x(r.h), youtube:_x(r.k),
      lat:r.i||null, lon:r.j||null
    }));
  } catch(e){ return []; }
}
const AFFILIATES = _decode(_d);

/* ============================================================
   APPEARANCE
   ============================================================ */
const CONFIG = {
  pinColor:   '#20FDF0',
  pinColorHl: '#ffffff',
};

/* ============================================================
   STATE COORDINATES
   ============================================================ */
const STATE_CENTROIDS = {
  "Alabama":[-86.9023,32.3182],"Alaska":[-153.4937,61.3707],"Arizona":[-111.0937,34.0489],"Arkansas":[-92.3731,34.7999],
  "California":[-119.4179,36.7783],"Colorado":[-105.3111,39.5501],"Connecticut":[-72.7554,41.6032],"Delaware":[-75.5071,38.9108],
  "Florida":[-81.5158,27.6648],"Georgia":[-83.6431,32.6415],"Hawaii":[-155.5828,19.8968],"Idaho":[-114.7420,44.0682],
  "Illinois":[-89.1965,40.6331],"Indiana":[-86.1349,40.2672],"Iowa":[-93.0977,41.8780],"Kansas":[-98.4842,38.5266],
  "Kentucky":[-84.2700,37.8393],"Louisiana":[-91.9623,31.1695],"Maine":[-69.4455,45.2538],"Maryland":[-76.6413,39.0458],
  "Massachusetts":[-71.3824,42.4072],"Michigan":[-85.6024,44.3148],"Minnesota":[-94.6859,46.7296],"Mississippi":[-89.3985,32.3547],
  "Missouri":[-91.8318,37.9643],"Montana":[-110.3626,46.8797],"Nebraska":[-99.9018,41.4925],"Nevada":[-116.4194,38.8026],
  "New Hampshire":[-71.5724,43.1939],"New Jersey":[-74.4057,40.0583],"New Mexico":[-106.2485,34.5199],"New York":[-74.9654,43.2994],
  "North Carolina":[-79.0193,35.7596],"North Dakota":[-101.0020,47.5515],"Ohio":[-82.9071,40.4173],"Oklahoma":[-97.0929,35.4676],
  "Oregon":[-120.5542,43.8041],"Pennsylvania":[-77.1945,41.2033],"Rhode Island":[-71.4774,41.5801],"South Carolina":[-80.9450,33.8361],
  "South Dakota":[-99.9018,43.9695],"Tennessee":[-86.5804,35.5175],"Texas":[-99.3413,31.9686],"Utah":[-111.0937,39.3210],
  "Vermont":[-72.5778,44.5588],"Virginia":[-78.6569,37.4316],"Washington":[-120.7401,47.7511],"West Virginia":[-80.4549,38.5976],
  "Wisconsin":[-88.7879,43.7844],"Wyoming":[-107.2903,43.0760]
};

let projectionFn = null;
let highlightedId = null;

function getStateCoord(s) {
  const ll = STATE_CENTROIDS[s];
  if (!ll || !projectionFn) return null;
  return projectionFn(ll);
}

function applyConfig() {
  document.documentElement.style.setProperty('--pin-color', CONFIG.pinColor);
  document.documentElement.style.setProperty('--pin-color-hl', CONFIG.pinColorHl);
  const lh1 = document.getElementById('lh1');
  if (lh1) lh1.setAttribute('fill', CONFIG.pinColor);
}

/* ── STATS ── */
function renderStats() {
  document.getElementById('s-total').textContent = AFFILIATES.length;
  document.getElementById('s-states').textContent = new Set(AFFILIATES.map(a=>a.state)).size;
  document.getElementById('s-ig').textContent = AFFILIATES.filter(a=>a.instagram).length;
  document.getElementById('s-fb').textContent = AFFILIATES.filter(a=>a.facebook).length;
  document.getElementById('s-yt').textContent = AFFILIATES.filter(a=>a.youtube).length;
  const stateCount={};
  AFFILIATES.forEach(a=>{ stateCount[a.state]=(stateCount[a.state]||0)+1; });
  const top=Object.entries(stateCount).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('s-top-state').textContent=top?top[0]:'—';

  document.getElementById('aff-count-sub').textContent = AFFILIATES.length + ' affiliates across ' + new Set(AFFILIATES.map(a=>a.state)).size + ' states';

  // Quick list in sidebar
  const el=document.getElementById('affiliate-quick-list');
  if(!AFFILIATES.length){el.innerHTML='<div style="text-align:center;padding:1.5rem 0;color:var(--sub);font-size:12px">No affiliates yet</div>';return;}
  el.innerHTML=AFFILIATES.map(a=>`
    <div class="quick-item" onclick="scrollToCard(${a.id})">
      <div>
        <div class="qi-name">${a.first} ${a.last}</div>
        <div class="qi-loc">${a.city}, ${a.state}</div>
      </div>
      <div class="qi-pills">
        ${a.instagram?`<span class="social-pill sp-ig">IG</span>`:''}
        ${a.facebook?`<span class="social-pill sp-fb">FB</span>`:''}
        ${a.youtube?`<span class="social-pill sp-yt">YT</span>`:''}
      </div>
    </div>`).join('');
}

/* ── BIO CARDS ── */
function getInitials(first, last) {
  return ((first||'').charAt(0) + (last||'').charAt(0)).toUpperCase();
}

function normalizeFacebook(url) {
  if (!url) return '';
  if (url.startsWith('http')) return url;
  return 'https://' + url;
}
function normalizeYoutube(url) {
  if (!url) return '';
  if (url.startsWith('http')) return url;
  return 'https://' + url;
}
function normalizeInstagram(handle) {
  if (!handle) return '';
  const h = handle.replace(/^@/,'').replace(/^https?:\/\/(www\.)?instagram\.com\//,'');
  return 'https://instagram.com/' + h;
}

function renderBioCards() {
  const grid = document.getElementById('bio-grid');
  if (!AFFILIATES.length) {
    grid.innerHTML = '<div class="no-affiliates">No affiliates to display yet.</div>';
    return;
  }
  grid.innerHTML = AFFILIATES.map(a => `
    <div class="bio-card" id="bio-card-${a.id}">
      <div class="bio-card-top">
        <div class="bio-avatar">${getInitials(a.first, a.last)}</div>
        <div class="bio-name-block">
          <div class="bio-name">${a.first} ${a.last}</div>
          <div class="bio-location">
            <svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M5 0C2.79 0 1 1.79 1 4C1 7 5 12 5 12C5 12 9 7 9 4C9 1.79 7.21 0 5 0ZM5 5.5C4.17 5.5 3.5 4.83 3.5 4C3.5 3.17 4.17 2.5 5 2.5C5.83 2.5 6.5 3.17 6.5 4C6.5 4.83 5.83 5.5 5 5.5Z" fill="#7a7f8e"/></svg>
            ${a.city}, ${a.state}
          </div>
        </div>
      </div>
      ${a.bio ? `<div class="bio-text">${a.bio}</div>` : '<div class="bio-text" style="font-style:italic;opacity:.5">No bio available.</div>'}
      ${(a.instagram || a.facebook || a.youtube) ? `
      <div class="bio-social">
        ${a.instagram ? `
        <a href="${normalizeInstagram(a.instagram)}" target="_blank" rel="noopener noreferrer" class="social-link ig">

function scrollToCard(id) {
  const el = document.getElementById('bio-card-'+id);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // Highlight briefly
  document.querySelectorAll('.bio-card').forEach(c=>c.classList.remove('highlighted'));
  el.classList.add('highlighted');
  setTimeout(()=>el.classList.remove('highlighted'), 2500);
  highlightedId = id;
  renderPins();
}

/* ── HEXAGON PINS ── */
function hexPoints(cx, cy, r) {
  const pts=[];
  for(let i=0;i<6;i++){const a=(Math.PI/180)*(60*i-30);pts.push(`${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)}`);}
  return pts.join(' ');
}

function renderPins() {
  const layer = document.getElementById('pins-g');
  layer.innerHTML = '';
  const tooltip = document.getElementById('map-tooltip');
  const wrap = document.getElementById('map-svg-wrap');
  const sz = 7;

  AFFILIATES.forEach(a => {
    const coord = (a.lat && a.lon && projectionFn) ? projectionFn([a.lon, a.lat]) : getStateCoord(a.state);
    if (!coord) return;
    const cx=coord[0], cy=coord[1];
    const isHL = highlightedId===a.id;

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'pointer';

    if (isHL) {
      const glow = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      glow.setAttribute('points', hexPoints(cx,cy,sz+6));
      glow.setAttribute('fill','none');
      glow.setAttribute('stroke', CONFIG.pinColor);
      glow.setAttribute('stroke-width','1.5');
      glow.setAttribute('opacity','0.4');
      g.appendChild(glow);
    }

    const hex = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    hex.setAttribute('points', hexPoints(cx, cy, sz));
    hex.setAttribute('fill', isHL ? CONFIG.pinColorHl : CONFIG.pinColor);
    hex.setAttribute('stroke', isHL ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.4)');
    hex.setAttribute('stroke-width', isHL ? '1.5' : '0.8');
    hex.setAttribute('opacity', '0.93');
    g.appendChild(hex);

    g.addEventListener('mouseenter', () => {
      hex.setAttribute('fill', CONFIG.pinColorHl);
      hex.setAttribute('stroke', 'rgba(255,255,255,0.6)');
      const svgRect = document.getElementById('usa-svg').getBoundingClientRect();
      const wrapRect = wrap.getBoundingClientRect();
      const px = cx*(svgRect.width/960) + (svgRect.left-wrapRect.left);
      const py = cy*(svgRect.height/600) + (svgRect.top-wrapRect.top);
      const igLink = a.instagram ? `<a href="${normalizeInstagram(a.instagram)}" target="_blank" class="social-pill sp-ig" style="text-decoration:none">@${a.instagram.replace(/^@/,'')}</a>` : '';
      const fbLink = a.facebook ? `<a href="${normalizeFacebook(a.facebook)}" target="_blank" class="social-pill sp-fb" style="text-decoration:none">Facebook</a>` : '';
      const ytLink = a.youtube ? `<a href="${normalizeYoutube(a.youtube)}" target="_blank" class="social-pill sp-yt" style="text-decoration:none">YouTube</a>` : '';
      tooltip.innerHTML = `
        <div class="tt-name">${a.first} ${a.last}</div>
        <div class="tt-loc">${a.city}, ${a.state}</div>
        ${a.bio ? `<div class="tt-bio">${a.bio.length>90?a.bio.slice(0,90)+'…':a.bio}</div>` : ''}
        <div class="tt-social">${igLink}${fbLink}${ytLink}</div>`;
      tooltip.style.display='block';
      tooltip.style.left=Math.min(px+12, wrapRect.width-210)+'px';
      tooltip.style.top=Math.max(py-100, 8)+'px';
    });
    g.addEventListener('mouseleave', () => {
      hex.setAttribute('fill', isHL ? CONFIG.pinColorHl : CONFIG.pinColor);
      hex.setAttribute('stroke', isHL ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.4)');
      tooltip.style.display = 'none';
    });
    g.addEventListener('click', () => scrollToCard(a.id));
    layer.appendChild(g);
  });
}

function drawStates() {
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(r=>r.json()).then(us=>{
    const proj = d3.geoAlbersUsa().scale(1280).translate([480,300]);
    projectionFn = proj;
    const path = d3.geoPath().projection(proj);
    const states = topojson.feature(us, us.objects.states);
    d3.select('#states-g').selectAll('path').data(states.features).enter().append('path').attr('d',path).attr('fill','#16181c').attr('stroke','#2a2d35').attr('stroke-width','0.8');
    renderPins();
  }).catch(()=>{
    projectionFn = d3.geoAlbersUsa().scale(1280).translate([480,300]);
    document.getElementById('states-g').innerHTML=`<rect x="60" y="80" width="840" height="440" rx="4" fill="#16181c" stroke="#2a2d35"/><text x="480" y="300" text-anchor="middle" font-size="14" fill="#3a3d47" font-family="Barlow,sans-serif">US Map</text>`;
    renderPins();
  });
}

applyConfig();
renderStats();
renderBioCards();
drawStates();
</script>
